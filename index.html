<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FANY ASISTENT IA — Prototipo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f5f7fa;
      color: #1a1a1a;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    h1 {
      color: #4f46e5;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 20px;
    }
    .controls {
      display: flex;
      gap: 10px;
    }
    button {
      background-color: #00bfa6;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #009e8c;
    }
    #output {
      margin-top: 30px;
      font-size: 1.2rem;
      max-width: 600px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>FANY ASISTENT IA</h1>
  <p>Tu asistente inteligente en tiempo real</p>
  <div class="controls">
    <button onclick="iniciarConversacion()">🎤 Iniciar conversación</button>
    <button onclick="detenerConversacion()">🛑 Detener</button>
  </div>
  <div id="output"></div>

  <script>
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.continuous = true;
    recognition.lang = 'es-ES';

    recognition.onresult = (event) => {
      const transcript = event.results[event.results.length - 1][0].transcript;
      document.getElementById('output').textContent = "Tú: " + transcript;
      
      // Aquí puedes conectar con tu backend IA para obtener respuesta
      // Por ejemplo: fetch('/api/responder', { method: 'POST', body: JSON.stringify({ mensaje: transcript }) })

      // Simulación de respuesta
      setTimeout(() => {
        const respuesta = "Estoy procesando tu mensaje: " + transcript;
        const respuestaVoz = new SpeechSynthesisUtterance(respuesta);
        respuestaVoz.lang = 'es-ES';
        speechSynthesis.speak(respuestaVoz);
        document.getElementById('output').textContent += "\nFANY: " + respuesta;
      }, 1000);
    };

    function iniciarConversacion() {
      recognition.start();
    }

    function detenerConversacion() {
      recognition.stop();
    }
  </script>
</body>
</html>
